openapi: 3.1.0
info:
  title: Larapanel Post API
  version: 1.1.0
  summary: API contract for mobile app integration with the post feature.
  description: |
    OpenAPI guide for the `post` feature used by the mobile app.

    Scope:
    - public read endpoints for web or external read-only clients
    - authenticated mobile CRUD endpoints
    - page-based pagination contract currently used for infinite query

    Notes:
    - authenticated mobile endpoints use bearer token auth
    - authenticated mobile list supports `scope=all|mine`
    - legacy mobile clients may also use `/mobile/posts/all` or `/mobile/posts/mine` as aliases for the protected list endpoint
    - cover upload uses `multipart/form-data`
    - public endpoints currently return the same post resource shape as authenticated endpoints
    - on guest requests, `is_mine`, `can_edit`, and `can_delete` are always `false`
    - public read endpoints use slug, authenticated mobile endpoints use `public_id`
servers:
  - url: /api
    description: Relative API base URL
tags:
  - name: Public Posts
    description: Public read endpoints for web or external read-only consumers.
  - name: Mobile Posts
    description: Authenticated mobile endpoints for listing all posts, listing owned posts, and managing owned posts.
paths:
  /posts:
    get:
      tags: [Public Posts]
      operationId: listPublicPosts
      summary: List public posts
      description: Returns a public paginated post list for mobile feed or external clients.
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Author'
        - $ref: '#/components/parameters/PostSort'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: Public post list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicPostIndexResponse'
              examples:
                default:
                  value:
                    data:
                      - public_id: 01JY7J2Z3S6Y9F8NABCD123456
                        title: Laravel API Guide
                        slug: laravel-api-guide
                        cover: uploads/posts/covers/2026/06/example.webp
                        cover_url: https://api.example.test/posts/01JY7J2Z3S6Y9F8NABCD123456/cover
                        body: Created for public mobile readers.
                        author: Rani
                        is_mine: false
                        can_edit: false
                        can_delete: false
                        created_at: '2026-06-15T08:45:10.000000Z'
                        updated_at: '2026-06-15T08:45:10.000000Z'
                    links:
                      first: /api/posts?page=1
                      last: /api/posts?page=3
                      prev: null
                      next: /api/posts?page=2
                    meta:
                      current_page: 1
                      from: 1
                      last_page: 3
                      links:
                        - url: null
                          label: '&laquo; Previous'
                          active: false
                        - url: /api/posts?page=1
                          label: '1'
                          active: true
                        - url: /api/posts?page=2
                          label: '2'
                          active: false
                      path: /api/posts
                      per_page: 10
                      to: 10
                      total: 23
                    filters:
                      search: Laravel
                      author: ''
                      sort: latest
                      per_page: 10
                    sort_options:
                      latest: Newest first
                      oldest: Oldest first
                      title: Title A-Z
                      author: Author A-Z
  /posts/{slug}:
    get:
      tags: [Public Posts]
      operationId: showPublicPost
      summary: Get public post detail
      parameters:
        - name: slug
          in: path
          required: true
          description: Public post slug.
          schema:
            type: string
      responses:
        '200':
          description: Public post detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostShowResponse'
        '404':
          description: Post not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
  /mobile/posts:
    get:
      tags: [Mobile Posts]
      operationId: listMyPosts
      summary: List posts for the authenticated mobile user scope
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MobilePostScope'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Author'
        - $ref: '#/components/parameters/PostSort'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: Authenticated post list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobilePostIndexResponse'
              examples:
                default:
                  value:
                    data:
                      - public_id: 01JY7J2Z3S6Y9F8NABCD123456
                        title: Mobile Owned Post
                        slug: mobile-owned-post
                        cover: null
                        cover_url: null
                        body: Created from the authenticated mobile app flow.
                        author: Mobile Writer
                        is_mine: true
                        can_edit: true
                        can_delete: true
                        created_at: '2026-06-15T08:45:10.000000Z'
                        updated_at: '2026-06-15T08:45:10.000000Z'
                    links:
                      first: /api/mobile/posts?page=1
                      last: /api/mobile/posts?page=1
                      prev: null
                      next: null
                    meta:
                      current_page: 1
                      from: 1
                      last_page: 1
                      links:
                        - url: null
                          label: '&laquo; Previous'
                          active: false
                        - url: /api/mobile/posts?page=1
                          label: '1'
                          active: true
                      path: /api/mobile/posts
                      per_page: 10
                      to: 1
                      total: 1
                    filters:
                      search: ''
                      author: ''
                      sort: latest
                      per_page: 10
                    sort_options:
                      latest: Newest first
                      oldest: Oldest first
                      title: Title A-Z
                      author: Author A-Z
                    scope: mine
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Mobile Posts]
      operationId: createPost
      summary: Create a post
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostMutationJsonRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PostMutationMultipartRequest'
      responses:
        '201':
          description: Post created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostMutationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
  /mobile/posts/{public_id}:
    get:
      tags: [Mobile Posts]
      operationId: showMyPost
      summary: Get one of the authenticated user's posts
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PublicId'
      responses:
        '200':
          description: Post detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostShowResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Post not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
    patch:
      tags: [Mobile Posts]
      operationId: updatePost
      summary: Update a post
      description: |
        Supports both JSON and multipart form updates.

        For clients that cannot send `PATCH multipart/form-data`, use:
        - `POST /api/mobile/posts/{public_id}`
        - form field `_method=PATCH`
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PublicId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostMutationJsonRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PostMutationMultipartRequest'
      responses:
        '200':
          description: Post updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostMutationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '404':
          description: Post not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
    delete:
      tags: [Mobile Posts]
      operationId: deletePost
      summary: Delete a post
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PublicId'
      responses:
        '200':
          description: Post deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Post not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
      description: Mobile auth bearer token.
  parameters:
    Search:
      name: search
      in: query
      required: false
      description: Search across `title`, `slug`, `author`, and `body`.
      schema:
        type: string
    Author:
      name: author
      in: query
      required: false
      description: Partial match filter against the post author.
      schema:
        type: string
    PostSort:
      name: sort
      in: query
      required: false
      description: Sort option for API list endpoints.
      schema:
        type: string
        enum: [latest, oldest, title, author]
        default: latest
    PerPage:
      name: per_page
      in: query
      required: false
      description: Page size. Unsupported values fall back to `10`.
      schema:
        type: integer
        enum: [5, 10, 15, 25]
        default: 10
    Page:
      name: page
      in: query
      required: false
      description: Laravel page-based pagination number.
      schema:
        type: integer
        minimum: 1
        default: 1
    MobilePostScope:
      name: scope
      in: query
      required: false
      description: |
        Authenticated mobile list scope.
        Use `all` to list every post visible to the authenticated user and `mine`
        to limit the list to posts owned by the authenticated user.
      schema:
        type: string
        enum: [all, mine]
        default: mine
    PublicId:
      name: public_id
      in: path
      required: true
      description: Post public identifier used by authenticated mobile endpoints.
      schema:
        type: string
  responses:
    Unauthorized:
      description: Authentication is required or token is invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessageResponse'
          examples:
            default:
              value:
                message: Unauthenticated.
    Forbidden:
      description: Authenticated user does not have permission for this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessageResponse'
          examples:
            default:
              value:
                message: This action is unauthorized.
    ValidationError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
  schemas:
    Post:
      type: object
      required:
        - public_id
        - title
        - slug
        - body
        - author
        - is_mine
        - can_edit
        - can_delete
        - created_at
        - updated_at
      properties:
        public_id:
          type: string
          example: 01JY7J2Z3S6Y9F8NABCD123456
        title:
          type: string
          maxLength: 255
          example: Laravel API Guide
        slug:
          type: string
          maxLength: 255
          example: laravel-api-guide
        cover:
          type: string
          nullable: true
          example: uploads/posts/covers/2026/06/example.webp
        cover_url:
          type: string
          nullable: true
          format: uri
          example: https://api.example.test/posts/01JY7J2Z3S6Y9F8NABCD123456/cover
        body:
          type: string
          example: Created from the mobile API.
        author:
          type: string
          example: Rani
        is_mine:
          type: boolean
        can_edit:
          type: boolean
        can_delete:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PostShowResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Post'
    PostMutationJsonRequest:
      type: object
      required: [title, body]
      properties:
        title:
          type: string
          maxLength: 255
        slug:
          type: string
          nullable: true
          maxLength: 255
          pattern: '^[A-Za-z0-9_-]+$'
          description: |
            Optional. When empty or omitted, the backend generates a slug automatically.
        body:
          type: string
        remove_cover:
          type: boolean
          default: false
          description: |
            Set `true` to remove the current cover.
            Ignored on create when no cover exists yet.
      additionalProperties: false
    PostMutationMultipartRequest:
      type: object
      required: [title, body]
      properties:
        title:
          type: string
          maxLength: 255
        slug:
          type: string
          nullable: true
          maxLength: 255
          pattern: '^[A-Za-z0-9_-]+$'
        body:
          type: string
        remove_cover:
          type: boolean
          default: false
        cover:
          type: string
          format: binary
          description: |
            Optional image file.
            Allowed mime extensions: jpg, jpeg, png, webp.
            Maximum size: 2048 KB.
        _method:
          type: string
          enum: [PATCH]
          description: Used only when sending multipart update through POST method override.
    PostMutationResponse:
      type: object
      required: [message, data]
      properties:
        message:
          type: string
          example: Post created.
        data:
          $ref: '#/components/schemas/Post'
    DeleteResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: Post deleted.
    PaginationLink:
      type: object
      required: [url, label, active]
      properties:
        url:
          type: string
          nullable: true
        label:
          type: string
        active:
          type: boolean
    PaginationLinks:
      type: object
      required: [first, last, prev, next]
      properties:
        first:
          type: string
          nullable: true
        last:
          type: string
          nullable: true
        prev:
          type: string
          nullable: true
        next:
          type: string
          nullable: true
    PaginationMeta:
      type: object
      required:
        - current_page
        - from
        - last_page
        - links
        - path
        - per_page
        - to
        - total
      properties:
        current_page:
          type: integer
        from:
          type: integer
          nullable: true
        last_page:
          type: integer
        links:
          type: array
          items:
            $ref: '#/components/schemas/PaginationLink'
        path:
          type: string
        per_page:
          type: integer
        to:
          type: integer
          nullable: true
        total:
          type: integer
    PostFilters:
      type: object
      required: [search, author, sort, per_page]
      properties:
        search:
          type: string
        author:
          type: string
        sort:
          type: string
          enum: [latest, oldest, title, author]
        per_page:
          type: integer
          enum: [5, 10, 15, 25]
    PostSortOptions:
      type: object
      required: [latest, oldest, title, author]
      properties:
        latest:
          type: string
        oldest:
          type: string
        title:
          type: string
        author:
          type: string
    PublicPostIndexResponse:
      type: object
      required: [data, links, meta, filters, sort_options]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Post'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
        filters:
          $ref: '#/components/schemas/PostFilters'
        sort_options:
          $ref: '#/components/schemas/PostSortOptions'
    MobilePostIndexResponse:
      allOf:
        - $ref: '#/components/schemas/PublicPostIndexResponse'
        - type: object
          required: [scope]
          properties:
            scope:
              type: string
              enum: [all, mine]
    ErrorMessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
    ValidationErrorResponse:
      type: object
      required: [message, errors]
      properties:
        message:
          type: string
          example: The given data was invalid.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            title:
              - The title field is required.
            cover:
              - The cover must be an image.
    NotFoundResponse:
      type: object
      properties:
        message:
          type: string
          example: Not Found
